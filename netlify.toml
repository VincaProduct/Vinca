# Build configuration
[build]
  command = "npm run build"
  publish = "dist"

# Enable prerendering for social media crawlers and SEO bots
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true


# Redirect all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache control headers for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[edge_functions]]
function = "tags"
path = "/blog/*"

[[edge_functions]]
function = "sitemap"
path = "/sitemap.xml"